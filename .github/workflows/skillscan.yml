name: SkillScan

on:
  push:
    branches: [main]
    paths: ['skills/**']
  pull_request:
    paths: ['skills/**']

permissions:
  contents: write
  security-events: write
  id-token: write
  attestations: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install SkillScan
        run: pip install skillscan-security

      - name: Scan all skills (JSON)
        id: scan
        run: |
          skillscan scan skills/ --format json --out scan-report.json --fail-on never
          echo "verdict=$(python3 -c "import json; print(json.load(open('scan-report.json')).get('verdict','allow'))")" >> "$GITHUB_OUTPUT"

      - name: Scan all skills (SARIF)
        if: always()
        run: skillscan scan skills/ --format sarif --out results.sarif --fail-on never

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif

      - name: Attest report
        if: github.ref == 'refs/heads/main' && hashFiles('scan-report.json') != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: scan-report.json

      - name: Generate badge
        if: always()
        run: |
          VERDICT="${{ steps.scan.outputs.verdict || 'unknown' }}"
          case "$VERDICT" in
            allow) COLOR="brightgreen"; MSG="PASS" ;;
            warn)  COLOR="yellow";      MSG="WARN" ;;
            block) COLOR="red";         MSG="BLOCK" ;;
            *)     COLOR="lightgrey";   MSG="ERROR" ;;
          esac
          VERSION=$(skillscan version --json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          DATE=$(date -u +%Y-%m-%d)
          printf '{"schemaVersion":1,"label":"SkillScan v%s","message":"%s (%s)","color":"%s"}\n' "$VERSION" "$MSG" "$DATE" "$COLOR" > skillscan-badge.json

      - name: Commit badge
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skillscan-badge.json
          git diff --staged --quiet || git commit -m "chore: update SkillScan badge" && git push
